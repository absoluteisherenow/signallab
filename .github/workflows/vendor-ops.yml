name: vendor-ops

# Twice-daily scan of Gmail for action-required vendor mail (billing fails,
# outages, security alerts, deliverability hits, expirations <14d). Surfaces
# P0/P1 hits as push notifications + brain_todos; logs everything to
# vendor_ops_alerts. Same GH-Actions-as-cron pattern as ticket-stats.yml
# because OpenNext doesn't route CF Worker `scheduled` events to Next routes.
# Route: signallab/src/app/api/crons/vendor-ops/route.ts (CRON_SECRET bearer).

on:
  schedule:
    - cron: '0 7,17 * * *'   # 07:00 + 17:00 UTC = 08:00 + 18:00 BST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB writes, no push, no Gmail label)'
        required: false
        default: 'false'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit vendor-ops cron
        run: |
          url="https://signallabos.com/api/crons/vendor-ops"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            url="${url}?dry_run=1"
          fi
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$url")
          echo "HTTP $code"
          cat /tmp/body
          test "$code" = "200"
