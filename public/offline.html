<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>Offline — Signal Lab</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0;
      background: #050505; color: #f2f2f2;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
      text-align: center;
    }
    .brand {
      font-size: 10px; font-weight: 700; letter-spacing: 0.24em;
      text-transform: uppercase; color: #b0b0b0; margin-bottom: 32px;
    }
    .title {
      font-size: 28px; font-weight: 800; letter-spacing: -0.035em;
      text-transform: uppercase; margin: 0 0 12px;
    }
    .body {
      font-size: 14px; color: #b0b0b0; max-width: 320px;
      line-height: 1.5; margin: 0 0 28px;
    }
    button {
      background: transparent; color: #f2f2f2;
      border: 1px solid #333; padding: 14px 22px;
      font-family: inherit; font-size: 11px; font-weight: 800;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    button:active { background: #111; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Signal Lab</div>
    <h1 class="title">No signal</h1>
    <p class="body">You're offline. Recent data is cached — reconnect to sync the latest.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
