<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Lab</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0906;
    color: #e8dcc8;
    font-family: 'Courier New', Courier, monospace;
    -webkit-font-smoothing: antialiased;
    font-size: 12px;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Header ── */
  #header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    padding: 0 14px;
    background: #0e0c08;
    border-bottom: 1px solid #1e1c18;
  }
  #header-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c9a46e;
  }
  #status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2a2218;
    transition: background 0.3s, box-shadow 0.3s;
  }
  #status-dot.active { background: #c9a46e; box-shadow: 0 0 6px rgba(201,164,110,0.6); }
  #status-dot.green  { background: #4ecb71; box-shadow: 0 0 6px rgba(78,203,113,0.5); }

  /* ── Stem type selector ── */
  #stem-bar {
    flex-shrink: 0;
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    background: #0c0a06;
    border-bottom: 1px solid #1a1612;
    flex-wrap: wrap;
  }
  .stem-btn {
    font-family: inherit;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a3028;
    background: transparent;
    border: 1px solid #2a2218;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .stem-btn:hover { color: #c9a46e; border-color: #4a3a28; }
  .stem-btn.selected { color: #c9a46e; border-color: #c9a46e; background: #1a1208; }

  /* ── Drop zone ── */
  #drop-area {
    flex-shrink: 0;
    margin: 12px 14px 0;
    border: 1px dashed #2a2218;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  #drop-area:hover { border-color: #4a3a28; }
  #drop-area.drag  { border-color: #c9a46e; background: #1a1208; }
  #drop-area.has-file { border-color: #4ecb71; background: #0a1009; border-style: solid; }
  #drop-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a3028;
    pointer-events: none;
    transition: color 0.15s;
  }
  #drop-area:hover #drop-label { color: #6a5a40; }
  #drop-area.has-file #drop-label { color: #4ecb71; }
  #file-input { display: none; }

  /* ── Run button ── */
  #run-btn {
    flex-shrink: 0;
    margin: 8px 14px;
    width: calc(100% - 28px);
    height: 32px;
    background: linear-gradient(180deg, #3a2e1c 0%, #2a200e 100%);
    border: 1px solid #c9a46e;
    color: #c9a46e;
    font-family: inherit;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #run-btn:disabled { opacity: 0.3; cursor: default; }
  #run-btn:not(:disabled):hover { opacity: 0.85; }

  .spinner {
    width: 8px; height: 8px;
    border: 1px solid #c9a46e;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Results ── */
  #result-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 14px;
  }
  #result-area::-webkit-scrollbar { width: 3px; }
  #result-area::-webkit-scrollbar-track { background: transparent; }
  #result-area::-webkit-scrollbar-thumb { background: #2a2218; }

  .result-meta {
    margin-bottom: 10px;
  }
  .result-type {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c9a46e;
    margin-bottom: 4px;
  }
  .result-char {
    font-size: 10px;
    color: #6a5a40;
    line-height: 1.5;
    font-style: italic;
  }
  .result-issues {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .issue-chip {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9a5a50;
    border: 1px solid #3a2018;
    padding: 2px 6px;
  }

  .chain-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #3a3028;
    margin-bottom: 6px;
  }
  .chain-step {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid #1a1612;
    margin-bottom: 4px;
    background: #0c0a06;
    position: relative;
  }
  .step-num {
    font-size: 8px;
    font-weight: 700;
    color: #3a3028;
    min-width: 12px;
    padding-top: 1px;
  }
  .step-body { flex: 1; min-width: 0; }
  .step-plugin {
    font-size: 10px;
    font-weight: 700;
    color: #c9a46e;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .step-role {
    font-size: 9px;
    color: #5a4a38;
    margin-bottom: 3px;
  }
  .step-hint {
    font-size: 9px;
    color: #8a7a60;
    font-family: 'Courier New', monospace;
    line-height: 1.4;
  }

  .idle-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    gap: 6px;
    text-align: center;
  }
  .idle-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #2a2218;
  }
  .idle-sub {
    font-size: 9px;
    color: #2a2218;
    line-height: 1.5;
  }

  .err-msg {
    font-size: 10px;
    color: #9a5a50;
    padding: 10px;
    border: 1px solid #3a2018;
    text-align: center;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-title">Chain Lab</div>
    <div id="status-dot"></div>
  </div>

  <div id="stem-bar">
    <button class="stem-btn selected" data-type="kick">Kick</button>
    <button class="stem-btn" data-type="bass">Bass</button>
    <button class="stem-btn" data-type="synths">Synths</button>
    <button class="stem-btn" data-type="drums">Drums</button>
    <button class="stem-btn" data-type="pads">Pads</button>
    <button class="stem-btn" data-type="full mix">Full Mix</button>
  </div>

  <div id="drop-area">
    <input type="file" id="file-input" accept=".wav,.aif,.aiff,.mp3,.m4a,.flac">
    <div id="drop-label">Drop stem here or click to browse</div>
  </div>

  <button id="run-btn" disabled>Get chain</button>

  <div id="result-area">
    <div class="idle-msg">
      <div class="idle-title">Drop a stem</div>
      <div class="idle-sub">Select stem type above<br>drop audio to get your chain</div>
    </div>
  </div>

</div>

<script>
var BASE_URL    = 'https://signal-lab-rebuild.vercel.app';
var ANALYSE_URL = BASE_URL + '/api/stem-analyse';

var selectedType  = 'kick';
var pendingFile   = null;
var audioCtx      = null;
var isBusy        = false;
var installedPlugins = [];

// ── Load installed plugins ────────────────────────────────────────────────
(function() {
  fetch(BASE_URL + '/api/plugins/list')
    .then(function(r) { return r.json(); })
    .then(function(d) { if (Array.isArray(d.plugins) && d.plugins.length) installedPlugins = d.plugins; })
    .catch(function() {});
})();

// ── Stem type selector ────────────────────────────────────────────────────
document.querySelectorAll('.stem-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.stem-btn').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedType = btn.dataset.type;
  });
});

// ── Drop zone ─────────────────────────────────────────────────────────────
var dropArea  = document.getElementById('drop-area');
var fileInput = document.getElementById('file-input');
var dropLabel = document.getElementById('drop-label');
var runBtn    = document.getElementById('run-btn');
var statusDot = document.getElementById('status-dot');

dropArea.addEventListener('click', function() { fileInput.click(); });

dropArea.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropArea.classList.add('drag');
});
dropArea.addEventListener('dragleave', function() {
  dropArea.classList.remove('drag');
});
dropArea.addEventListener('drop', function(e) {
  e.preventDefault();
  dropArea.classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if (f) setFile(f);
});

fileInput.addEventListener('change', function() {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  pendingFile = f;
  dropArea.classList.add('has-file');
  var name = f.name.length > 32 ? f.name.slice(0, 30) + '…' : f.name;
  dropLabel.textContent = name;
  runBtn.disabled = false;
  statusDot.className = 'active';
}

// ── Audio measurement (FFT + acoustic analysis) ───────────────────────────

function computeFFT(realIn) {
  var n = realIn.length;
  var real = new Float32Array(n), imag = new Float32Array(n);
  for (var i = 0; i < n; i++) real[i] = realIn[i] * 0.5 * (1 - Math.cos(6.283185307 * i / (n - 1)));
  var j = 0;
  for (var ii = 1; ii < n; ii++) {
    var bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (ii < j) { var t = real[ii]; real[ii] = real[j]; real[j] = t; }
  }
  for (var len = 2; len <= n; len <<= 1) {
    var ang = -2 * Math.PI / len;
    var wRe = Math.cos(ang), wIm = Math.sin(ang);
    for (var ki = 0; ki < n; ki += len) {
      var cRe = 1, cIm = 0;
      for (var k = 0; k < len / 2; k++) {
        var uR = real[ki+k], uI = imag[ki+k];
        var vR = real[ki+k+len/2]*cRe - imag[ki+k+len/2]*cIm;
        var vI = real[ki+k+len/2]*cIm + imag[ki+k+len/2]*cRe;
        real[ki+k] = uR+vR; imag[ki+k] = uI+vI;
        real[ki+k+len/2] = uR-vR; imag[ki+k+len/2] = uI-vI;
        var nr = cRe*wRe - cIm*wIm; cIm = cRe*wIm + cIm*wRe; cRe = nr;
      }
    }
  }
  var mags = new Float32Array(n/2);
  for (var mi = 0; mi < n/2; mi++) mags[mi] = Math.sqrt(real[mi]*real[mi]+imag[mi]*imag[mi])/n;
  return mags;
}

function measureBuffer(buf, filename) {
  var ch = buf.numberOfChannels, sr = buf.sampleRate, len = buf.length;
  var mono = new Float32Array(len);
  for (var c = 0; c < ch; c++) {
    var d = buf.getChannelData(c);
    for (var i = 0; i < len; i++) mono[i] += d[i] / ch;
  }
  var peak = 0, sumSq = 0;
  for (var i = 0; i < len; i++) {
    var a = Math.abs(mono[i]);
    if (a > peak) peak = a;
    sumSq += mono[i] * mono[i];
  }
  var rms = Math.sqrt(sumSq / len);
  var peak_db = peak > 1e-10 ? 20*Math.log10(peak) : -96;
  var rms_db  = rms  > 1e-10 ? 20*Math.log10(rms)  : -96;
  var crest_db = peak_db - rms_db;

  var fftSize = 16384;
  var mid = Math.max(0, Math.floor(len/2) - fftSize/2);
  var padded = new Float32Array(fftSize);
  padded.set(mono.subarray(mid, mid + fftSize));
  var mags = computeFFT(padded);
  var numBins = mags.length, binHz = sr / fftSize;

  var tot = 0, ws = 0;
  for (var k = 1; k < numBins; k++) { tot += mags[k]; ws += k * binHz * mags[k]; }
  var centroid = tot > 0 ? ws / tot : 1000;

  var lowBin = Math.ceil(200 / binHz), highBin = Math.floor(4000 / binHz);
  var low = 0, high = 0, all = 0;
  for (var k = 1; k < numBins; k++) {
    var e = mags[k] * mags[k];
    all += e;
    if (k < lowBin) low += e;
    if (k >= highBin) high += e;
  }

  var logS = 0, arS = 0, vB = 0;
  for (var k = 1; k < numBins; k++) {
    if (mags[k] > 1e-12) { logS += Math.log(mags[k]); arS += mags[k]; vB++; }
  }
  var flat = vB > 0 && arS > 0 ? Math.min(1, Math.exp(logS/vB) / (arS/vB)) : 0;

  var fMin = Math.floor(30 / binHz), fMax = Math.ceil(600 / binHz);
  var fPk = 0, fBin = 1;
  for (var k = fMin; k < Math.min(fMax, numBins); k++) {
    if (mags[k] > fPk) { fPk = mags[k]; fBin = k; }
  }

  var envWin = Math.max(1, Math.round(sr * 0.002));
  var nF = Math.floor(len / envWin);
  var env = new Float32Array(nF);
  for (var f = 0; f < nF; f++) {
    var r = 0;
    for (var s = f*envWin; s < (f+1)*envWin && s < len; s++) r += mono[s]*mono[s];
    env[f] = Math.sqrt(r / envWin);
  }
  var maxR = 0;
  for (var f = 1; f < nF; f++) { var rise = env[f] - env[f-1]; if (rise > maxR) maxR = rise; }

  return {
    filename: filename,
    duration_ms: Math.round(buf.duration * 1000),
    sample_rate: sr,
    channels: ch,
    peak_db: Math.round(peak_db * 10) / 10,
    rms_db: Math.round(rms_db * 10) / 10,
    dynamic_range_db: Math.round((peak_db - rms_db) * 10) / 10,
    spectral_centroid_hz: Math.round(centroid),
    low_energy_ratio: all > 0 ? Math.round(low/all * 1000) / 1000 : 0,
    high_energy_ratio: all > 0 ? Math.round(high/all * 1000) / 1000 : 0,
    transient_sharpness: Math.min(1, Math.round(maxR * 4 * 1000) / 1000),
    fundamental_hz: Math.round(fBin * binHz),
    crest_factor_db: Math.round(crest_db * 10) / 10,
    spectral_flatness: Math.round(flat * 1000) / 1000,
  };
}

// ── Render chain result ───────────────────────────────────────────────────
function renderResult(data) {
  var ra = document.getElementById('result-area');

  var html = '';

  if (data.type || data.subtype) {
    html += '<div class="result-meta">';
    html += '<div class="result-type">' + esc((data.subtype || data.type || '').toUpperCase()) + '</div>';
    if (data.character) {
      html += '<div class="result-char">' + esc(data.character) + '</div>';
    }
    html += '</div>';
  }

  if (data.detected_issues && data.detected_issues.length) {
    html += '<div class="result-issues">';
    data.detected_issues.forEach(function(issue) {
      html += '<div class="issue-chip">' + esc(issue) + '</div>';
    });
    html += '</div>';
  }

  if (data.chain && data.chain.length) {
    html += '<div class="chain-label">Signal chain</div>';
    data.chain.forEach(function(step, i) {
      html += '<div class="chain-step">';
      html += '<div class="step-num">' + (i + 1) + '</div>';
      html += '<div class="step-body">';
      html += '<div class="step-plugin">' + esc(step.plugin || '') + '</div>';
      if (step.role) html += '<div class="step-role">' + esc(step.role) + '</div>';
      if (step.hint) html += '<div class="step-hint">' + esc(step.hint) + '</div>';
      else if (step.params && step.params.description) {
        html += '<div class="step-hint">' + esc(step.params.description) + '</div>';
      }
      html += '</div></div>';
    });
  }

  if (data.match_summary) {
    html += '<div style="margin-top:8px;font-size:9px;color:#5a4a38;font-style:italic;line-height:1.5;">' + esc(data.match_summary) + '</div>';
  }

  ra.innerHTML = html;
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Run ───────────────────────────────────────────────────────────────────
runBtn.addEventListener('click', function() {
  if (isBusy || !pendingFile) return;
  runAnalysis(pendingFile);
});

function runAnalysis(file) {
  isBusy = true;
  runBtn.disabled = true;
  runBtn.innerHTML = '<div class="spinner"></div> Measuring…';
  statusDot.className = 'active';

  var ra = document.getElementById('result-area');
  ra.innerHTML = '<div class="idle-msg"><div class="idle-title">Measuring audio…</div></div>';

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  file.arrayBuffer()
    .then(function(ab) {
      return audioCtx.decodeAudioData(ab);
    })
    .then(function(buf) {
      runBtn.innerHTML = '<div class="spinner"></div> Building chain…';
      ra.innerHTML = '<div class="idle-msg"><div class="idle-title">Building chain…</div></div>';

      var measurements = measureBuffer(buf, file.name);

      var body = {
        stem: measurements,
        available_plugins: installedPlugins.length ? installedPlugins : undefined
      };

      return fetch(ANALYSE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      renderResult(data);
      statusDot.className = 'green';
    })
    .catch(function(err) {
      var ra = document.getElementById('result-area');
      ra.innerHTML = '<div class="err-msg">' + esc(err.message || 'Analysis failed') + '</div>';
      statusDot.className = '';
    })
    .finally(function() {
      isBusy = false;
      runBtn.disabled = false;
      runBtn.innerHTML = 'Get chain';
    });
}
</script>
</body>
</html>
