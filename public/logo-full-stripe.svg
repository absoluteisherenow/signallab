<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64">
  <!-- Signal Lab OS — Stripe Logo lockup. Dark backing + white wordmark + red OS. -->
  <rect width="280" height="64" rx="8" fill="#050505"/>
  <svg x="8" y="8" width="48" height="48" viewBox="0 0 64 64">
    <rect x="6" y="6" width="52" height="52" rx="10" fill="none" stroke="#ff2a1a" stroke-width="1.5" opacity="0.85"/>
    <polyline points="12,32 22,32 26,18 32,46 36,26 40,34 44,30 50,32"
      stroke="#ff2a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <text x="64" y="40" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="22" letter-spacing="0.5" xml:space="preserve"><tspan fill="#f0ebe2">Signal Lab </tspan><tspan fill="#ff2a1a">OS</tspan></text>
</svg>
